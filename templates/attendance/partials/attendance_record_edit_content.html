{% load djicons i18n %}
<div data-back-url="{% url 'attendance:attendance_records_list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Edit Attendancerecord" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'attendance:attendance_records_list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="edit-attendance_record-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="edit-attendance_record-form"
          hx-post="{% url 'attendance:attendance_record_edit' obj.id %}" class="max-w-2xl">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Employee Id" %}</label>
                <input type="text" name="employee_id" class="input input-sm w-full" value="{{ obj.employee_id }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Employee Name" %}</label>
                <input type="text" name="employee_name" class="input input-sm w-full" value="{{ obj.employee_name }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Clock In" %}</label>
                <input type="datetime-local" name="clock_in" class="input input-sm w-full" value="{{ obj.clock_in }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Clock Out" %}</label>
                <input type="datetime-local" name="clock_out" class="input input-sm w-full" value="{{ obj.clock_out }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Break Minutes" %}</label>
                <input type="number" name="break_minutes" class="input input-sm w-full" value="{{ obj.break_minutes }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Total Hours" %}</label>
                <input type="number" name="total_hours" class="input input-sm w-full" step="0.01" value="{{ obj.total_hours }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Status" %}</label>
                <select name="status" class="select select-sm w-full">
                <option value="">---</option>
                </select>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Notes" %}</label>
                <textarea name="notes" class="textarea textarea-sm w-full" rows="3">{{ obj.notes }}</textarea>
                </div>
            </div>
        </div>
    </form>
</div>
