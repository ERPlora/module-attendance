{% load djicons i18n chooser %}

<div class="side-sheet-header">
    <h3 class="sheet-title">{% trans "Add Attendance Record" %}</h3>
    <button class="sheet-close" @click="closePanel()">{% icon "close-outline" %}</button>
</div>

<div class="side-sheet-content">
    <form id="add-attendance_record-form"
          hx-post="{% url 'attendance:attendance_record_add' %}"
          hx-target="#datatable-body"
          hx-swap="innerHTML"
          @htmx:after-request="closePanel()"
          @chooser-change.window="if ($event.detail.name === 'employee_id') { $el.querySelector('[name=employee_name]').value = $event.detail.items.length ? $event.detail.items[0].label : '' }"
          class="flex flex-col gap-4 p-6">
        {% csrf_token %}

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Employee" %}</label>
            {% chooser "accounts.localuser" name="employee_id" %}
            <input type="hidden" name="employee_name" value="">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Clock In" %}</label>
            <input type="datetime-local" name="clock_in" class="input input-sm w-full">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Clock Out" %}</label>
            <input type="datetime-local" name="clock_out" class="input input-sm w-full">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Break Minutes" %}</label>
            <input type="number" name="break_minutes" class="input input-sm w-full" placeholder="0">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Total Hours" %}</label>
            <input type="number" name="total_hours" class="input input-sm w-full" step="0.01" placeholder="0">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Status" %}</label>
            <select name="status" class="select select-sm w-full">
                <option value="present">{% trans "Present" %}</option>
                <option value="late">{% trans "Late" %}</option>
                <option value="absent">{% trans "Absent" %}</option>
                <option value="half_day">{% trans "Half Day" %}</option>
                <option value="remote">{% trans "Remote" %}</option>
            </select>
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Notes" %}</label>
            <textarea name="notes" class="textarea textarea-sm w-full" rows="3"></textarea>
        </div>
    </form>
</div>

<div class="side-sheet-footer">
    <div class="flex justify-end gap-2">
        <button type="button" class="btn btn-ghost btn-sm" @click="closePanel()">{% trans "Cancel" %}</button>
        <button type="submit" form="add-attendance_record-form" class="btn btn-sm color-primary">
            {% icon "add-outline" %} {% trans "Add" %}
        </button>
    </div>
</div>
